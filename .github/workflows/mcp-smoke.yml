name: "CI / MCP Smoke"

on:
  schedule:
    # Every 6 hours, staggered from other workflows
    - cron: "17 */6 * * *"
  workflow_dispatch:
    inputs:
      force_run:
        description: "Force run even if recently executed"
        required: false
        default: "false"

concurrency:
  group: mcp-smoke
  cancel-in-progress: false

jobs:
  smoke:
    name: "🔍 MCP Smoke Test"
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: ✅ Checkout code
        uses: actions/checkout@v6

      - name: 🔍 Run MCP smoke test
        id: smoke
        env:
          MCP_SMOKE_ENDPOINT: ${{ secrets.MCP_SMOKE_ENDPOINT }}
          MCP_SMOKE_KEY: ${{ secrets.MCP_SMOKE_KEY }}
          MCP_SMOKE_TIMEOUT: "15"
        run: |
          set +e
          OUTPUT=$(bash ops/smoke/mcp-health.sh 2>&1)
          EXIT_CODE=$?
          set -e

          # Parse the single-line summary (last line of stdout)
          SUMMARY=$(echo "$OUTPUT" | tail -1)
          DETAILS=$(echo "$OUTPUT" | head -n -1)

          echo "exit_code=${EXIT_CODE}" >> "$GITHUB_OUTPUT"
          echo "summary=${SUMMARY}" >> "$GITHUB_OUTPUT"

          if [[ $EXIT_CODE -eq 0 ]]; then
            echo "### ✅ MCP Healthy" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "${SUMMARY}" >> "$GITHUB_STEP_SUMMARY"
          elif [[ $EXIT_CODE -eq 1 ]]; then
            echo "### 🔴 MCP Auth Failure" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "${SUMMARY}" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo "${DETAILS}" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### ⚫ MCP Unreachable" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "${SUMMARY}" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo "${DETAILS}" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi

          # Always report; fail the job on non-healthy
          if [[ $EXIT_CODE -ne 0 ]]; then
            echo "::error::MCP smoke failed: ${SUMMARY}"
            exit 1
          fi

      - name: 📝 Create issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const summary = '${{ steps.smoke.outputs.summary }}';
            const exitCode = '${{ steps.smoke.outputs.exit_code }}';
            const state = exitCode === '1' ? 'AUTH_FAIL' : 'UNREACHABLE';
            const title = `🚨 MCP Smoke: ${state} — ${new Date().toISOString().slice(0,10)}`;

            // Check if there's already an open smoke issue to avoid duplicates
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'mcp-smoke,auto',
              per_page: 1,
            });

            if (existing.data.length > 0) {
              // Comment on existing issue instead of creating duplicate
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.data[0].number,
                body: `**Repeat failure** (${state})\n\n\`\`\`\n${summary}\n\`\`\`\n\nRun: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              });
              return;
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body: `## MCP Smoke Test Failure\n\n**State:** ${state}\n**Summary:** \`${summary}\`\n**Workflow run:** [${context.runId}](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})\n\n### What this means\n\nThe automated MCP production smoke test detected that the endpoint is **${state.toLowerCase().replace('_', ' ')}**. This issue was auto-created.\n\n### Action required\n\n- [ ] Investigate MCP endpoint status\n- [ ] Fix the root cause\n- [ ] Close this issue once smoke test passes\n`,
              labels: ['mcp-smoke', 'auto', 'P1'],
            });
