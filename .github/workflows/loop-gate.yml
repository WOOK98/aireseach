name: Loop Gate

on:
  pull_request:
    branches: ["*"]
  merge_group:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_COLOR: "1"
  SKIP_ENV_VALIDATION: "1"
  TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}

jobs:
  redline-grep:
    name: Redline grep
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check changed product files for banned UI language
        shell: bash
        run: |
          set -euo pipefail
          base_ref="${{ github.base_ref || 'main' }}"
          git fetch origin "$base_ref" --depth=1
          mapfile -t files < <(
            git diff --name-only "origin/$base_ref"...HEAD \
              | grep -E '^(apps|packages|skills)/' \
              | grep -Ev '(^|/)(docs|__snapshots__)/|\.md$|\.mdx$|\.test\.|\.spec\.' \
              || true
          )
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No changed product files to scan."
            exit 0
          fi
          printf '%s\n' "${files[@]}"
          if grep -nE 'Target price|Buy-Hold-Sell|hosted DeepSeek|unlimited Jina|process\.env\.[A-Z0-9_]*(KEY|SECRET|TOKEN)' "${files[@]}"; then
            echo "Redline grep failed: banned wording or env/provider leakage found."
            exit 1
          fi

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup
        uses: ./tooling/github/setup

      - name: Build content collections
        run: pnpm --filter @workspace/cms build

      - name: Build web
        run: pnpm --filter web build

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup
        uses: ./tooling/github/setup

      - name: Run all unit tests
        run: pnpm test

  mcp-auth-tests:
    name: MCP auth tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup
        uses: ./tooling/github/setup

      - name: Run MCP auth tests when present
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t tests < <(find . -path './node_modules' -prune -o -type f \( -name '*auth.test.ts' -o -name '*auth.spec.ts' \) -print)
          if [ "${#tests[@]}" -eq 0 ]; then
            echo "No MCP auth test files found yet."
            exit 0
          fi
          pnpm exec vitest run "${tests[@]}"

  python-compile:
    name: Python py_compile
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Compile report agent
        run: python -m py_compile apps/report-agent/server.py

  playwright-smoke:
    name: Playwright smoke
    runs-on: ubuntu-latest
    # CI budget: ≤ 60 s total (no local build — tests hit Vercel preview).
    timeout-minutes: 3
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup
        uses: ./tooling/github/setup

      - name: Install Playwright browsers
        run: pnpm exec playwright install chromium --with-deps

      - name: Get Vercel preview URL
        id: vercel
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # Wait for Vercel deployment to be ready (max 3 min)
          for i in $(seq 1 18); do
            DEPLOY_ID=$(gh api repos/${{ github.repository }}/deployments \
              --jq '.[0].id' 2>/dev/null || echo "")
            if [ -n "$DEPLOY_ID" ]; then
              URL=$(gh api repos/${{ github.repository }}/deployments/$DEPLOY_ID/statuses \
                --jq '.[0].target_url' 2>/dev/null || echo "")
              STATE=$(gh api repos/${{ github.repository }}/deployments/$DEPLOY_ID/statuses \
                --jq '.[0].state' 2>/dev/null || echo "")
              if [ "$STATE" = "success" ] && [ -n "$URL" ]; then
                echo "url=$URL" >> "$GITHUB_OUTPUT"
                echo "Preview URL: $URL"
                exit 0
              fi
              echo "Waiting for Vercel... ($i/18) state=$STATE"
            else
              echo "Waiting for Vercel deployment... ($i/18)"
            fi
            sleep 10
          done
          echo "Vercel deployment not ready after 3 min — skipping smoke tests"
          echo "url=" >> "$GITHUB_OUTPUT"

      - name: Run smoke tests (≤60s budget)
        if: steps.vercel.outputs.url != ''
        run: pnpm exec playwright test --config tests/workflow/playwright.config.ts
        env:
          CI: "1"
          BASE_URL: ${{ steps.vercel.outputs.url }}

      - name: Skip smoke tests (Vercel not ready)
        if: steps.vercel.outputs.url == ''
        run: echo "Skipping Playwright smoke — Vercel preview not available"

      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-smoke-artifacts
          path: |
            test-results/
            tests/workflow/playwright-report/
          retention-days: 7
